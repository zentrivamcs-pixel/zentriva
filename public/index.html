<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#131b2e" />
    <meta
      name="description"
      content="Zentriva Multipurpose Cooperative Society — skills training, mentorship, and community-based economic empowerment for young people and professionals in Nigeria."
    />
    <!-- Social sharing (Open Graph / Twitter) — og-image.png is the logo
         centered on a 1200x630 canvas, the standard link-preview ratio. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Zentriva Multipurpose Cooperative Society" />
    <meta property="og:description" content="Skilled. Empowered. Rooted in Purpose. Join a member-driven cooperative offering training, mentorship, and real economic opportunity." />
    <meta property="og:image" content="%PUBLIC_URL%/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Zentriva Multipurpose Cooperative Society" />
    <meta name="twitter:description" content="Skilled. Empowered. Rooted in Purpose. Join a member-driven cooperative offering training, mentorship, and real economic opportunity." />
    <meta name="twitter:image" content="%PUBLIC_URL%/og-image.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="%PUBLIC_URL%/logo192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="%PUBLIC_URL%/logo512.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!-- Fonts used by the member portal (src/member) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <!-- Paystack's inline.js is injected on demand by the registration form -->
    <style>
      /* Material Symbols render their ligature names as text until the font
         loads — hide icon text until then instead of flashing raw words. */
      .material-symbols-outlined {
        font-family: 'Material Symbols Outlined', sans-serif;
        visibility: visible;
      }
    </style>
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>ZENTRIVA</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
  </body>
</html>
